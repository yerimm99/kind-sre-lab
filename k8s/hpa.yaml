apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sre-lab-api
  namespace: sre-lab
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sre-lab-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
